steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx:6
    settings:
      registry: docker.io
      repo: alejoide/projects-api
      username:
        from_secret: github_username
      password:
        from_secret: github_token
      tags:
        - latest
        - ${CI_COMMIT_TAG}
      dockerfile: Dockerfile
      platforms: linux/amd64,linux/arm64
  - name: trigger-deploy
    image: woodpeckerci/plugin-trigger
    settings:
      token:
        from_secret: woodpecker_deploy_token
      repositories:
        - 4l3j0Ok/alejoide-web
    when:
      status:
        - success
when:
  event:
    - tag
  branch:
    - main
